name: Sync Wiki Descriptions

on:
  push:
    branches: [main]
    paths:
      - 'README.zh-CN.md'
      - 'README.en.md'
      - '.github/workflows/sync-wiki.yml'

permissions: read-all

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout wiki repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy and rename Chinese description
        run: |
          cp "README.zh-CN.md" "wiki/Description(Zh).md"

      - name: Copy and rename English description
        run: |
          cp "README.en.md" "wiki/Description(En).md"

      - name: Commit and push to wiki if changed
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update descriptions from repository"
          git push
