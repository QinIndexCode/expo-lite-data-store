name: Release package

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Validate and publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify tag matches package version
        run: node -e "const pkg=require('./package.json');const expected='v'+pkg.version;if(process.env.GITHUB_REF_NAME!==expected){console.error('Tag '+process.env.GITHUB_REF_NAME+' does not match package version '+expected);process.exit(1)}"

      - name: Verify release commit belongs to main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must point to a commit contained in origin/main."
            exit 1
          fi

      - name: Verify npm authentication is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::The NPM_TOKEN repository secret is required to publish this package."
            exit 1
          fi

      - name: Run release gate
        run: npm run prepublishOnly

      - name: Verify npm package contents
        run: npm pack --dry-run --ignore-scripts

      - name: Publish to npm with provenance
        run: npm publish --ignore-scripts --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
